name: Анализ комплектов

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4
      
      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Установка библиотек
        run: |
          pip install pandas openpyxl xlrd requests
      
      - name: Запуск анализа
        run: |
          echo "🚀 Запуск Python скрипта..."
          python working_analyze.py
          echo "📊 Код возврата: $?"
      
      - name: Показать все файлы и логи
        run: |
          echo ""
          echo "=========================================="
          echo "📁 СПИСОК ВСЕХ ФАЙЛОВ В РЕПОЗИТОРИИ"
          echo "=========================================="
          ls -la
          echo ""
          echo "=========================================="
          echo "📊 ПОИСК CSV ФАЙЛОВ"
          echo "=========================================="
          ls -la *.csv 2>/dev/null || echo "❌ CSV файлы не найдены!"
          echo ""
          echo "=========================================="
          echo "📄 ПОИСК LOG ФАЙЛОВ"
          echo "=========================================="
          ls -la *.log 2>/dev/null || echo "❌ LOG файлы не найдены!"
          echo ""
          echo "=========================================="
          echo "📋 СОДЕРЖИМОЕ LOG ФАЙЛОВ (если есть)"
          echo "=========================================="
          cat *.log 2>/dev/null || echo "Нет log файлов"
      
      - name: Сохранение результатов
        uses: actions/upload-artifact@v4
        with:
          name: результаты-анализа
          path: |
            *.csv
            *.log
          retention-days: 30
          if-no-files-found: warn
