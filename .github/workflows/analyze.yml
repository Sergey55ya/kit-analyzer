name: Анализ комплектов

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4
      
      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Установка библиотек
        run: |
          pip install pandas openpyxl xlrd requests
      
      - name: Запуск анализа
        run: python working_analyze.py
      
      - name: Сохранение результатов как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: результаты-анализа
          path: results_*.csv
          retention-days: 30
      
      - name: Отправка результатов на email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Тележки с инструментом"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions <${{ secrets.EMAIL_FROM }}>
          body: |
            Здравствуйте!
            
            Анализ складских остатков завершен.
            
            📅 Дата и время: ${{ github.event.head_commit.timestamp }}
            
            Файл с результатами прикреплен к этому письму.
            
            ---
            Автоматическое сообщение от GitHub Actions
          attachments: results_*.csv
          convert_markdown: true
