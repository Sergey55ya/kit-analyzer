name: Анализ комплектов

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Установка библиотек
        run: |
          pip install pandas openpyxl xlrd requests
      - name: Запуск анализа
        run: python working_analyze.py
      - name: Сохранение результатов
        uses: actions/upload-artifact@v4
        with:
          name: результаты-анализа
          path: results_*.csv
          retention-days: 30
